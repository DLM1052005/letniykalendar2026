<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Летние задания по математике 6 класс</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e6f0fa;
      margin: 0;
      padding: 15px;
      color: #000;
    }
    .header {
      text-align: center;
      background: white;
      padding: 20px;
      border: 4px solid #003366;
      margin-bottom: 25px;
    }
    .teacher {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .teacher img {
      width: 140px;
      border: 4px solid #003366;
      border-radius: 8px;
    }
    h1 { margin: 8px; font-size: 26px; color: #003366; }
    .calendar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      max-width: 1300px;
      margin: 0 auto;
    }
    .day {
      background: white;
      border: 3px solid #003366;
      padding: 15px;
      min-height: 240px;
    }
    .date {
      font-weight: bold;
      font-size: 19px;
      color: #003366;
      border-bottom: 3px solid #003366;
      padding-bottom: 8px;
      margin-bottom: 10px;
    }
    .task {
      font-size: 14.5px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
    .locked {
      background: #f4f4f4;
      color: #555;
      text-align: center;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="teacher">
      <img src="https://files.catbox.moe/1v4l2k.jpg" alt="Коптева Лайсан Мунавировна">
      <div>
        <h1>Летний календарь заданий по математике</h1>
        <p><strong>Для учащихся 6 класса</strong></p>
        <p><strong>Учитель математики:</strong> Коптева Лайсан Мунавировна</p>
      </div>
    </div>
  </div>

  <div id="calendar" class="calendar"></div>

  <script>
    const tasks = {
      // ИЮНЬ 2026
      "2026-06-01": "Вычислите\n6,29/0,85+(53+48,184):5,6",
      "2026-06-02": "Решите уравнение\n4x+5x+4,7=16,4",
      "2026-06-03": "В коробке лежат 14 шаров, из которых 5 синего цвета. Какую часть всех шаров составляют синие?",
      "2026-06-04": "Решите уравнение\nx : 2 2/15 = 9/16",
      "2026-06-05": "Миша может съесть арбуз за 12 минут, а Коля — за 16 минут. Какая часть арбуза останется через 1 минуту, если мальчики одновременно начнут его есть?",
      "2026-06-06": "Вычислите\n(1 1/35 / 4/5 - 1 8/35) * 3 1/3",
      "2026-06-07": "Решите уравнение\nx - 3 8/9 = 5/12",
      "2026-06-08": "Разложите на простые множители числа 625, 2772, 1224, 702",
      "2026-06-09": "Отдых!",
      "2026-06-10": "В спортивном соревновании участвовали 72 школьника, среди которых 18 девочек. Во сколько раз число участников-мальчиков больше числа девочек?",
      "2026-06-11": "Автомобиль проезжает за 10 с. За какое время он проедет это же расстояние, если его скорость увеличится в 1,2 раза?",
      "2026-06-12": "Отдых!",
      "2026-06-13": "Вычислите площадь цилиндрической фигуры, если длина стороны квадрата равна 1 см",
      "2026-06-14": "Приведите примеры предметов, имеющих форму цилиндра и конуса",
      "2026-06-15": "В коробке лежат пять шаров красных и три шара синих. Какова вероятность того, что вынутый наугад шар окажется красным? Синим?",
      "2026-06-16": "Найдите НОД 16 и 24; 45 и 56; 12, 18 и 24",
      "2026-06-17": "Магазин продал 480 кг огурцов и помидоров, причём огурцов было 85% от массы проданных овощей. Сколько килограммов огурцов продали?",
      "2026-06-18": "Вычислите\n9×13 + 9×2\n54×13"
    };

    const calendar = document.getElementById('calendar');
    const startDate = new Date("2026-06-01");
    const today = new Date();
    today.setHours(0,0,0,0);

    for (let i = 0; i < 100; i++) {
      const date = new Date(startDate);
      date.setDate(date.getDate() + i);
      const dateStr = date.toISOString().split('T')[0];
      
      const dayEl = document.createElement('div');
      dayEl.className = 'day';
      const isUnlocked = date <= today;

      if (isUnlocked) {
        dayEl.innerHTML = `
          <div class="date">${date.getDate()} ${date.toLocaleString('ru', {month: 'long'})} ${date.getFullYear()}</div>
          <div class="task">${tasks[dateStr] || 'Задание отсутствует'}</div>
        `;
      } else {
        dayEl.classList.add('locked');
        dayEl.innerHTML = `
          <div class="date">${date.getDate()} ${date.toLocaleString('ru', {month: 'long'})} ${date.getFullYear()}</div>
          <p>Задание откроется ${date.toLocaleDateString('ru')}</p>
        `;
      }
      calendar.appendChild(dayEl);
    }
  </script>
</body>
</html>
